# SSH brute-force protection. 5 failed auths from one IP within 10 minutes
# earns a 1-hour ban. SSH does NOT go through Cloudflare, so the source IP
# in the log is already the real attacker IP — no real_ip plumbing needed.
[sshd]
enabled  = true
port     = ssh
filter   = sshd
backend  = systemd
maxretry = 5
findtime = 600
bantime  = 3600
