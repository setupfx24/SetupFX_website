# Credential-stuffing / brute-force protection on the auth endpoints.
# Trips after 8 failed login/register/OTP/forgot-password POSTs from one IP
# within 10 minutes. Requires cloudflare-real-ip.conf to be installed so the
# logged IP is the actual attacker, not a Cloudflare PoP.
[setupfx-auth]
enabled  = true
filter   = setupfx-auth
port     = http,https
logpath  = /var/log/nginx/access.log
maxretry = 8
findtime = 600
bantime  = 3600
