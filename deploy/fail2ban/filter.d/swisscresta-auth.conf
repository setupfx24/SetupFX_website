# Matches a 401/403 response on any /api/v1/auth/* POST in the nginx access
# log. fail2ban substitutes <HOST> with the leading IP from $remote_addr,
# which after cloudflare-real-ip.conf is the real client.
[Definition]
failregex = ^<HOST> .*"POST /api/v1/auth/(login|register|verify-otp|forgot-password|reset-password)[^"]*" (401|403)
ignoreregex =
