name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — syntax + import smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install minimal deps
        # Just enough to import the models + schemas packages.
        run: |
          pip install \
            'sqlalchemy[asyncio]>=2.0.30' \
            'pydantic>=2.7.0' \
            'pydantic[email]>=2.7.0' \
            'asyncpg>=0.29.0' \
            'fastapi>=0.111.0'

      - name: AST parse every Python file under backend/
        run: |
          python - <<'PY'
          import ast, pathlib, sys
          bad = 0
          for p in pathlib.Path('backend').rglob('*.py'):
              try:
                  ast.parse(p.read_text(encoding='utf-8'))
              except SyntaxError as e:
                  bad += 1
                  print(f'SYNTAX ERR {p}: {e}', file=sys.stderr)
          if bad:
              sys.exit(1)
          print('All backend Python files parse cleanly.')
          PY

      - name: Import-smoke the models + schemas packages
        # Stub DATABASE_URL etc. — config.py reads env at import time.
        env:
          DATABASE_URL: postgresql+asyncpg://x:x@localhost:5432/x
          TIMESCALE_URL: postgresql+asyncpg://x:x@localhost:5432/x
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-stub-secret-1234567890123456789012
          USER_JWT_SECRET: ci-stub-secret-1234567890123456789012
          ADMIN_JWT_SECRET: ci-stub-secret-1234567890123456789012
        run: |
          export PYTHONPATH=backend
          python - <<'PY'
          # Verify every legacy import name still resolves through the new packages.
          from packages.common.src.models import (
              Base,
              OrderType, OrderSide, OrderStatus, PositionStatus, AllocationCopyType,
              order_type_enum, order_side_enum, order_status_enum, position_status_enum,
              User, UserSession, PasswordResetToken, UserRefreshToken, KYCDocument,
              IPLog, AuditLog, UserAuditLog, Employee,
              InstrumentSegment, Instrument, InstrumentConfig, InstrumentConfigAudit,
              AccountGroup, TradingAccount, Order, Position, TradeHistory,
              BankAccount, Deposit, Withdrawal, Transaction,
              ChargeConfig, SpreadConfig, SwapConfig,
              IBProfile, IBApplication, IBCommissionPlan, IBCommission, Referral,
              MasterAccount, InvestorAllocation, CopyTrade,
              SupportTicket, TicketMessage, Notification, Banner,
              SystemSetting, BonusOffer, UserBonus,
              InsurancePolicy, InsuranceClaim,
              RewardsUserState, RewardsMission, RewardsUserMissionProgress,
              RewardStoreItem, RewardsTransaction,
              SharedTrade,
          )
          from packages.common.src.schemas import (
              RegisterRequest, LoginRequest, ForgotPasswordRequest, ResetPasswordRequest,
              BootstrapSessionRequest, OpenLiveAccountRequest,
              TokenResponse, UserResponse, MessageResponse,
              TradingAccountResponse, AccountSummary,
              PlaceOrderRequest, ModifyOrderRequest, OrderResponse,
              PositionResponse, ClosePositionRequest, ModifyPositionRequest,
              DepositRequest, WithdrawalRequest,
              TransferTradingToMainRequest, TransferMainToTradingRequest,
              InternalWalletTransferRequest,
              DepositResponse, WithdrawalResponse, BankAccountCreate,
              TickData, OHLCVBar, InstrumentResponse,
              AdminFundAdjustment, AdminTradeCreate, AdminModifyTrade,
              PaginationParams, PaginatedResponse,
              InsuranceQuoteRequest, InsuranceTierQuote,
              InsuranceActivateRequest, InsuranceActivateResponse,
              InsurancePolicyOut, InsuranceClaimOut,
          )
          # Confirm SQLAlchemy registered every ORM table.
          tables = sorted(Base.metadata.tables.keys())
          print(f'{len(tables)} ORM tables registered:')
          for t in tables:
              print(f'  - {t}')
          PY

  frontend:
    name: Frontend — typecheck both apps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [trader, admin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/${{ matrix.app }}/package-lock.json
      - name: Install dependencies
        working-directory: frontend/${{ matrix.app }}
        run: npm ci --legacy-peer-deps
      - name: Typecheck
        working-directory: frontend/${{ matrix.app }}
        run: npx tsc --noEmit
