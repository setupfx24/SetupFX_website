[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read", path = "./" }]

# Strict Solidity compile + extra fuzzing for the audit-bound contract.
fuzz = { runs = 1024, seed = "0x1" }
invariant = { runs = 256, depth = 32 }

[etherscan]
# BscScan API key is the same key for mainnet (chain 56) and testnet
# (chain 97). Register one free at bscscan.com → register → API.
bsc_testnet = { key = "${BSCSCAN_API_KEY}", chain = 97, url = "https://api-testnet.bscscan.com/api" }
bsc         = { key = "${BSCSCAN_API_KEY}", chain = 56, url = "https://api.bscscan.com/api" }

[rpc_endpoints]
bsc_testnet = "${BSC_TESTNET_RPC_URL}"
bsc         = "${BSC_RPC_URL}"
