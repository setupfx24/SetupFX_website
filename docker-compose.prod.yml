# ============================================================
# SwissCresta — Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================
name: swisscresta

services:
  # ── Infrastructure — restart policy only (no host ports needed) ──
  postgres:
    restart: always

  timescaledb:
    restart: always

  redis:
    restart: always

  # Kafka + Zookeeper + kafka-ui removed (see docker-compose.yml).

  # ── Backend services — restart policy + localhost-only ports ──
  admin-api:
    ports:
      - "127.0.0.1:8003:8001"
    restart: always
    environment:
      # Admin API is reached exclusively from the admin SPA — never from
      # the trader or marketing domain. Lock CORS to admin.swisscresta.com
      # so a compromise of the other surfaces can't pivot here.
      CORS_ORIGINS: https://admin.swisscresta.com
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001", "--workers", "2"]

  gateway:
    ports:
      - "127.0.0.1:8002:8000"
    restart: always
    environment:
      # swisscresta.com is the apex marketing host and ALSO serves the
      # auth pages (see frontend/trader/src/middleware.ts file header) —
      # so a login POST from /auth/login on the apex carries
      # Origin: https://swisscresta.com and gateway must accept it.
      # Removing the apex broke login entirely (403 "Origin not allowed").
      #
      # The C1 audit risk this re-enables — XSS on the marketing site
      # pivoting to credentialed API calls — is mitigated properly by
      # moving the auth flow off the apex (TODO: redirect /auth/* on
      # swisscresta.com to trade.swisscresta.com so the apex no longer
      # needs gateway access). Until that's done we keep parity with
      # the pre-audit allow-list.
      CORS_ORIGINS: https://swisscresta.com,https://trade.swisscresta.com,https://admin.swisscresta.com
      COOKIE_DOMAIN: .swisscresta.com
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    command: ["uvicorn", "services.gateway.src.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]

  market-data:
    restart: always

  b-book-engine:
    restart: always

  risk-engine:
    restart: always

  # ── Frontends — build with production domain + restart ──────
  trader-frontend:
    build:
      context: ./frontend/trader
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-production}
        NEXT_PUBLIC_WS_URL: wss://api.swisscresta.com
        NEXT_PUBLIC_MARKETING_HOST: swisscresta.com
        NEXT_PUBLIC_TRADE_HOST: trade.swisscresta.com
        # Baked into the bundle at build time so the Google Sign-In button can render.
        # Same value as backend GOOGLE_CLIENT_ID. Leave blank to hide the button.
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        # WalletConnect (Reown Cloud) project id for RainbowKit. Without it,
        # only browser-injected wallets (MetaMask, OKX) work; the WalletConnect
        # mobile-deeplink path (Trust Wallet etc.) is disabled.
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:-}
    ports:
      - "127.0.0.1:3012:3000"
    environment:
      INTERNAL_API_URL: http://gateway:8000/api/v1
      TRADER_API_PROXY_TARGET: http://gateway:8000
      # Browser WebSocket connects directly to api subdomain
      NEXT_PUBLIC_WS_URL: wss://api.swisscresta.com
      # Host pair for the marketing/app domain split (read by src/middleware.ts)
      NEXT_PUBLIC_MARKETING_HOST: swisscresta.com
      NEXT_PUBLIC_TRADE_HOST: trade.swisscresta.com
      # DO NOT set NEXT_PUBLIC_GATEWAY_URL — browser uses same-origin /api/v1 proxy (avoids CORS)
    restart: always

  admin-frontend:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3013:3001"
    environment:
      ADMIN_API_PROXY_TARGET: http://admin-api:8001
    restart: always
